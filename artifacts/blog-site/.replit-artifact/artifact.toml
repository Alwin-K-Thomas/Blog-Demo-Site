kind = "web"
previewPath = "/"
title = "Blog Site"
version = "1.0.0"
id = "artifacts/blog-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22723

[services.development]
run = "pnpm --filter @workspace/blog-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blog-site", "run", "build" ]
publicDir = "artifacts/blog-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22723"
BASE_PATH = "/"
